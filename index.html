<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoxAffiliate AI</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom Styles untuk Scrollbar & Animations */
        body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        .animate-spin-slow { animation: spin 2s linear infinite; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans selection:bg-indigo-500/30 min-h-screen">

    <!-- Header -->
    <header class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="bg-indigo-500 p-2 rounded-xl shadow-lg shadow-indigo-500/20">
                    <i data-lucide="mic" class="w-6 h-6 text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                        VoxAffiliate AI
                    </h1>
                    <p class="text-xs text-slate-400 font-medium tracking-wide">STUDIO NARATOR OTOMATIS</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 py-8">
        
        <!-- Error Alert -->
        <div id="errorSection" class="hidden mb-6 p-4 bg-red-500/10 border border-red-500/50 rounded-2xl flex items-center gap-3 text-red-400">
            <div class="bg-red-500/20 p-1.5 rounded-full"><i data-lucide="sparkles" class="w-4 h-4"></i></div>
            <p id="errorMessage" class="text-sm font-medium">Terjadi kesalahan.</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- KOLOM KIRI: Input & Settings -->
            <div class="lg:col-span-5 space-y-6">
                
                <!-- Card Produk -->
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-indigo-500/5 rounded-full blur-3xl -mr-10 -mt-10 pointer-events-none"></div>
                    
                    <h2 class="text-lg font-semibold text-white flex items-center gap-2 mb-5">
                        <i data-lucide="sparkles" class="w-5 h-5 text-indigo-400"></i>
                        Data Produk
                    </h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1.5 ml-1">Nama Produk</label>
                            <input 
                                type="text" 
                                id="productName"
                                placeholder="Contoh: Sepatu Sneaker AeroX"
                                class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all"
                            />
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1.5 ml-1">Deskripsi & Keunggulan</label>
                            <textarea 
                                id="description"
                                placeholder="Contoh: Super ringan, bahan breathable, sol empuk anti lecet. Cocok untuk lari dan nongkrong."
                                rows="3"
                                class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-white placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all resize-none"
                            ></textarea>
                        </div>
                        
                        <button 
                            id="btnGenerateScript"
                            class="w-full bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 hover:border-slate-600 rounded-xl py-3 px-4 font-medium transition-all flex items-center justify-center gap-2 group disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <span id="btnScriptIcon"><i data-lucide="wand-2" class="w-4 h-4 text-indigo-400 group-hover:scale-110 transition-transform"></i></span>
                            <span id="btnScriptText">Buatkan Script Otomatis</span>
                        </button>
                    </div>
                </div>

                <!-- Card Voice Settings -->
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl">
                    <h2 class="text-lg font-semibold text-white flex items-center gap-2 mb-5">
                        <i data-lucide="settings-2" class="w-5 h-5 text-purple-400"></i>
                        Pengaturan Suara
                    </h2>

                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-slate-400 mb-1.5 ml-1">Pilih Model Suara</label>
                            <div class="relative">
                                <select 
                                    id="voiceSelect"
                                    class="w-full appearance-none bg-slate-950/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 transition-all cursor-pointer"
                                ></select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-400">
                                    <svg class="w-4 h-4 fill-current" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" /></svg>
                                </div>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-1.5 ml-1 flex items-center gap-1.5">
                                    <i data-lucide="fast-forward" class="w-3.5 h-3.5"></i> Kecepatan
                                </label>
                                <select 
                                    id="speedSelect"
                                    class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 transition-all cursor-pointer"
                                >
                                    <option value="lambat">Lambat</option>
                                    <option value="normal" selected>Normal</option>
                                    <option value="cepat">Cepat</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-slate-400 mb-1.5 ml-1 flex items-center gap-1.5">
                                    <i data-lucide="volume-2" class="w-3.5 h-3.5"></i> Nada (Pitch)
                                </label>
                                <select 
                                    id="pitchSelect"
                                    class="w-full bg-slate-950/50 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:border-purple-500 transition-all cursor-pointer"
                                >
                                    <option value="rendah">Rendah (Berat)</option>
                                    <option value="normal" selected>Normal</option>
                                    <option value="tinggi">Tinggi (Cempreng)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <!-- KOLOM KANAN: Editor & Player -->
            <div class="lg:col-span-7 space-y-6">
                
                <!-- Card Script Editor -->
                <div class="bg-slate-900 border border-slate-800 rounded-3xl p-6 shadow-xl h-full flex flex-col min-h-[400px]">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                            <i data-lucide="mic" class="w-5 h-5 text-blue-400"></i>
                            Script Narasi
                        </h2>
                        <span class="text-xs font-medium text-slate-500 bg-slate-800 px-2 py-1 rounded-md">Bisa Diedit</span>
                    </div>
                    
                    <textarea 
                        id="scriptInput"
                        placeholder="Tulis script narasi di sini, atau gunakan tombol 'Buatkan Script Otomatis' di sebelah kiri..."
                        class="flex-1 w-full bg-slate-950/50 border border-slate-700 rounded-2xl p-5 text-slate-200 placeholder-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 transition-all resize-none leading-relaxed text-lg font-medium"
                    ></textarea>

                    <div class="mt-6">
                        <button 
                            id="btnGenerateAudio"
                            class="w-full py-4 rounded-2xl font-bold text-lg shadow-xl flex items-center justify-center gap-3 transition-all bg-gradient-to-r from-indigo-500 via-purple-500 to-blue-500 text-white hover:shadow-indigo-500/25 hover:scale-[1.01] active:scale-[0.99] border border-transparent hover:border-white/20 disabled:opacity-75 disabled:cursor-not-allowed disabled:hover:scale-100 disabled:from-slate-800 disabled:to-slate-800 disabled:text-slate-400 disabled:border-slate-700"
                        >
                            <span id="btnAudioIcon"><i data-lucide="play" class="w-6 h-6 fill-current"></i></span>
                            <span id="btnAudioText">Generate Voice (WAV)</span>
                        </button>
                    </div>
                </div>

            </div>

        </div>

        <!-- SECTION HASIL AUDIO -->
        <div id="audioResultSection" class="hidden mt-8 bg-slate-900 border border-green-500/30 rounded-3xl p-6 shadow-2xl shadow-green-500/5 duration-500">
            <div class="flex flex-col md:flex-row items-center justify-between gap-6">
                
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <div class="bg-green-500/20 p-3 rounded-2xl">
                        <i data-lucide="check-circle" class="w-8 h-8 text-green-400"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-bold text-white">Audio Berhasil Dibuat!</h3>
                        <p class="text-sm text-slate-400">Format: WAV berkualitas tinggi</p>
                    </div>
                </div>

                <div class="flex-1 w-full flex items-center justify-center">
                    <audio 
                        id="audioPlayer"
                        controls 
                        class="w-full max-w-md h-12 rounded-full [&::-webkit-media-controls-panel]:bg-slate-800 [&::-webkit-media-controls-current-time-display]:text-white [&::-webkit-media-controls-time-remaining-display]:text-white"
                    ></audio>
                </div>

                <div class="w-full md:w-auto">
                    <button 
                        id="btnDownload"
                        class="w-full md:w-auto bg-green-500 hover:bg-green-400 text-slate-950 font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition-colors shadow-lg shadow-green-500/20"
                    >
                        <i data-lucide="download" class="w-5 h-5"></i>
                        Download WAV
                    </button>
                </div>
                
            </div>
        </div>

    </main>

    <script>
        // Inisialisasi Icons
        lucide.createIcons();

        // Konfigurasi Data
        const VOICES = [
            "Zephyr", "Puck", "Charon", "Kore", "Fenrir", "Leda", "Orus", "Aoede", 
            "Callirrhoe", "Autonoe", "Enceladus", "Iapetus", "Umbriel", "Algieba", 
            "Despina", "Erinome", "Algenib", "Rasalgethi", "Laomedeia", "Achernar", 
            "Alnilam", "Schedar", "Gacrux", "Pulcherrima", "Achird", "Zubenelgenubi", 
            "Vindemiatrix", "Sadachbia", "Sadaltager", "Sulafat"
        ];
        
        const apiKey = ""; // API key akan disuntikkan oleh environment
        let currentAudioUrl = null;

        // Elemen DOM
        const productNameEl = document.getElementById('productName');
        const descriptionEl = document.getElementById('description');
        const scriptInputEl = document.getElementById('scriptInput');
        const voiceSelectEl = document.getElementById('voiceSelect');
        const speedSelectEl = document.getElementById('speedSelect');
        const pitchSelectEl = document.getElementById('pitchSelect');
        
        const btnGenerateScript = document.getElementById('btnGenerateScript');
        const btnGenerateAudio = document.getElementById('btnGenerateAudio');
        const btnDownload = document.getElementById('btnDownload');
        
        const errorSection = document.getElementById('errorSection');
        const errorMessage = document.getElementById('errorMessage');
        const audioResultSection = document.getElementById('audioResultSection');
        const audioPlayer = document.getElementById('audioPlayer');

        // Isi Dropdown Voices
        VOICES.forEach(voice => {
            const option = document.createElement('option');
            option.value = voice;
            option.textContent = `${voice} ${voice === 'Kore' || voice === 'Aoede' ? '(Rekomendasi)' : ''}`;
            if (voice === 'Kore') option.selected = true;
            voiceSelectEl.appendChild(option);
        });

        // Tampilkan Error
        function showError(msg) {
            errorMessage.textContent = msg;
            errorSection.classList.remove('hidden');
        }

        function hideError() {
            errorSection.classList.add('hidden');
        }

        // Auto-generate teks sederhana
        function checkAutoScript() {
            if (productNameEl.value && descriptionEl.value && !scriptInputEl.value) {
                scriptInputEl.value = `Halo semuanya! Kenalin nih produk andalan kita, ${productNameEl.value}. ${descriptionEl.value}. Yuk, buruan cek keranjang kuning sekarang juga sebelum kehabisan!`;
            }
            updateAudioButtonState();
        }

        productNameEl.addEventListener('input', checkAutoScript);
        descriptionEl.addEventListener('input', checkAutoScript);
        scriptInputEl.addEventListener('input', updateAudioButtonState);

        function updateAudioButtonState() {
            btnGenerateAudio.disabled = scriptInputEl.value.trim().length === 0;
        }

        // Fetch Utility dengan Exponential Backoff
        async function fetchWithRetry(url, options, maxRetries = 5) {
            const delays = [1000, 2000, 4000, 8000, 16000];
            for (let i = 0; i < maxRetries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    return await response.json();
                } catch (error) {
                    if (i === maxRetries - 1) throw error;
                    await new Promise(res => setTimeout(res, delays[i]));
                }
            }
        }

        // Konversi PCM16 Base64 ke WAV Blob
        function createWavBlob(base64Data, sampleRate = 24000) {
            const binaryString = window.atob(base64Data);
            const len = binaryString.length;
            const pcmBytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) pcmBytes[i] = binaryString.charCodeAt(i);

            const numChannels = 1;
            const bitsPerSample = 16;
            const byteRate = (sampleRate * numChannels * bitsPerSample) / 8;
            const blockAlign = (numChannels * bitsPerSample) / 8;
            const dataSize = pcmBytes.byteLength;
            const buffer = new ArrayBuffer(44 + dataSize);
            const view = new DataView(buffer);

            const writeString = (view, offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };

            writeString(view, 0, 'RIFF');
            view.setUint32(4, 36 + dataSize, true);
            writeString(view, 8, 'WAVE');
            writeString(view, 12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, numChannels, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, byteRate, true);
            view.setUint16(32, blockAlign, true);
            view.setUint16(34, bitsPerSample, true);
            writeString(view, 36, 'data');
            view.setUint32(40, dataSize, true);

            const targetArray = new Uint8Array(buffer, 44);
            targetArray.set(pcmBytes);

            return new Blob([buffer], { type: 'audio/wav' });
        }

        // Logic: Generate Script
        btnGenerateScript.addEventListener('click', async () => {
            const name = productNameEl.value.trim();
            const desc = descriptionEl.value.trim();

            if (!name || !desc) {
                showError('Masukkan Nama Produk dan Deskripsi terlebih dahulu!');
                return;
            }

            hideError();
            btnGenerateScript.disabled = true;
            document.getElementById('btnScriptIcon').innerHTML = `<i data-lucide="loader-circle" class="w-4 h-4 text-indigo-400 animate-spin"></i>`;
            document.getElementById('btnScriptText').textContent = 'Meracik Script...';
            lucide.createIcons();

            try {
                const prompt = `Buatkan script video pendek (TikTok/Reels) affiliate marketing yang sangat menarik, antusias, dan persuasif untuk produk berikut:\nNama Produk: ${name}\nDeskripsi: ${desc}\n\nScript harus singkat (sekitar 30-40 detik saat dibaca), menggunakan bahasa Indonesia yang gaul, asik, tapi profesional, dan diakhiri dengan ajakan untuk klik keranjang kuning atau link di bio. JANGAN BERIKAN TEKS LAIN SELAIN SCRIPTNYA.`;
                
                const payload = { contents: [{ parts: [{ text: prompt }] }] };

                const data = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`,
                    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
                );

                const generatedText = data?.candidates?.[0]?.content?.parts?.[0]?.text;
                if (generatedText) {
                    scriptInputEl.value = generatedText.trim();
                    updateAudioButtonState();
                } else {
                    throw new Error("Gagal mendapatkan teks dari AI.");
                }
            } catch (err) {
                showError('Gagal membuat script otomatis. Silakan tulis manual atau coba lagi.');
                console.error(err);
            } finally {
                btnGenerateScript.disabled = false;
                document.getElementById('btnScriptIcon').innerHTML = `<i data-lucide="wand-2" class="w-4 h-4 text-indigo-400 group-hover:scale-110 transition-transform"></i>`;
                document.getElementById('btnScriptText').textContent = 'Buatkan Script Otomatis';
                lucide.createIcons();
            }
        });

        // Logic: Generate Audio
        btnGenerateAudio.addEventListener('click', async () => {
            const script = scriptInputEl.value.trim();
            if (!script) {
                showError('Script masih kosong! Silakan tulis atau generate script dulu.');
                return;
            }

            hideError();
            audioResultSection.classList.add('hidden');
            if (currentAudioUrl) {
                URL.revokeObjectURL(currentAudioUrl);
                currentAudioUrl = null;
            }

            btnGenerateAudio.disabled = true;
            btnGenerateScript.disabled = true;
            
            document.getElementById('btnAudioIcon').innerHTML = `<i data-lucide="loader-circle" class="w-6 h-6 animate-spin"></i>`;
            document.getElementById('btnAudioText').textContent = 'Memanggil Voice Actor AI...';
            lucide.createIcons();

            try {
                const voice = voiceSelectEl.value;
                const speed = speedSelectEl.value;
                const pitch = pitchSelectEl.value;

                const speedMap = { lambat: "at a slightly slow pace", normal: "at a normal energetic pace", cepat: "very fast" };
                const pitchMap = { rendah: "with a deep and low pitch", normal: "with a normal pitch", tinggi: "with a high-pitched voice" };

                const instructionText = `Read the following Indonesian text enthusiastically, ${speedMap[speed]}, and ${pitchMap[pitch]}:\n\n${script}`;

                const payload = {
                    contents: [{ parts: [{ text: instructionText }] }],
                    generationConfig: {
                        responseModalities: ["AUDIO"],
                        speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } }
                    },
                    model: "gemini-2.5-flash-preview-tts"
                };

                const data = await fetchWithRetry(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`,
                    { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) }
                );

                const audioPart = data?.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                
                if (audioPart && audioPart.inlineData) {
                    const base64Data = audioPart.inlineData.data;
                    const mimeType = audioPart.inlineData.mimeType || 'audio/L16;rate=24000';
                    
                    let sampleRate = 24000;
                    const rateMatch = mimeType.match(/rate=(\d+)/);
                    if (rateMatch && rateMatch[1]) sampleRate = parseInt(rateMatch[1], 10);

                    const wavBlob = createWavBlob(base64Data, sampleRate);
                    currentAudioUrl = URL.createObjectURL(wavBlob);
                    
                    audioPlayer.src = currentAudioUrl;
                    audioResultSection.classList.remove('hidden');
                } else {
                    throw new Error("Tidak ada data audio yang diterima dari server.");
                }
            } catch (err) {
                showError('Terjadi kesalahan saat men-generate suara. Silakan coba lagi.');
                console.error(err);
            } finally {
                btnGenerateAudio.disabled = false;
                btnGenerateScript.disabled = false;
                document.getElementById('btnAudioIcon').innerHTML = `<i data-lucide="play" class="w-6 h-6 fill-current"></i>`;
                document.getElementById('btnAudioText').textContent = 'Generate Voice (WAV)';
                lucide.createIcons();
            }
        });

        // Logic: Download
        btnDownload.addEventListener('click', () => {
            if (!currentAudioUrl) return;
            const name = productNameEl.value.trim().replace(/\s+/g, '_') || 'Audio';
            const a = document.createElement('a');
            a.href = currentAudioUrl;
            a.download = `VoxAffiliate_${name}.wav`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // Init State
        updateAudioButtonState();
    </script>
</body>
</html>
